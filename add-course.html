<body><header>
    <h1>COURSE ORGANIZER</h1>

    <nav>
    <ul>
        <li><a href="index.html"> Main</a></li>

  <main>
    <div class="container">
        <div class="card">
            <h2>Add New Course</h2>
            
            <form>
                <div class="form-group">
                    <label>Course Name:</label>
                    <input type="text" placeholder="Enter course name" required>
                </div>

                <div class="form-group">
                    <label>Instructor:</label>
                    <input type="text" placeholder="Enter instructor name" required>
                </div>

                <div class="form-group">
                    <label>Credits:</label>
                    <input type="text" placeholder="Enter credit hours" required>
                </div>

                <div class="form-group">
                    <label>Notes:</label>
                    <textarea rows="2" placeholder="Any additional notes..."></textarea>
                </div>

                <button type="submit"> Add Course</button>
            </form>
        </div>
    </div>
</main>

<footer>
    <p>© 2025 Personal Course Organizer</p>
</footer>
